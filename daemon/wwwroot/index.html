<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Daemon -- Control Panel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ["'JetBrains Mono'", "'SF Mono'", "'Cascadia Code'", "monospace"] } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 3px;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .pulse-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .fade-in {
      animation: fade-in 0.2s ease-out;
    }

    /* Drag & Drop */
    [draggable] { transition: transform 0.15s ease, opacity 0.15s ease, border-color 0.15s ease; }

    /* Sticky table headers for all tabs */
    thead th {
      position: sticky;
      top: 0;
      background: #09090b;
      z-index: 10;
    }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100 m-0 p-0">
  <pre id="error-overlay" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a0505;color:#f87171;padding:16px;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:50vh;overflow:auto;border-bottom:2px solid #ef4444"></pre>
  <div id="root"></div>

  <!-- Global error catcher -->
  <script>
    const _errors = [];
    window.onerror = (msg, src, line, col, err) => {
      _errors.push(`${msg} at ${src}:${line}:${col}`);
      const el = document.getElementById('error-overlay');
      if (el) { el.style.display = 'block'; el.textContent = _errors.join('\n'); }
      console.error('GLOBAL ERROR:', msg, err);
    };
    window.addEventListener('unhandledrejection', e => {
      console.error('Unhandled rejection:', e.reason);
    });
  </script>

  <!-- Shared components, utilities, WebSocket manager -->
  <script type="text/babel" src="js/common.js"></script>

  <!-- Tab components (order doesn't matter — all loaded before app.js) -->
  <script type="text/babel" src="js/tabs/terminal-detail.js"></script>
  <script type="text/babel" src="js/tabs/terminal-settings.js"></script>
  <script type="text/babel" src="js/tabs/terminal-discovery.js"></script>
  <script type="text/babel" src="js/tabs/terminals.js"></script>
  <script type="text/babel" src="js/tabs/positions.js"></script>
  <script type="text/babel" src="js/tabs/strategies.js"></script>
  <script type="text/babel" src="js/tabs/sizing.js"></script>
  <script type="text/babel" src="js/tabs/virtual.js"></script>
  <script type="text/babel" src="js/tabs/log.js"></script>
  <script type="text/babel" src="js/tabs/trade-chart.js"></script>
  <script type="text/babel" src="js/tabs/backtest.js"></script>

  <!-- Main app (must be last — references all tab components) -->
  <script type="text/babel" src="js/app.js"></script>
</body>

</html>
